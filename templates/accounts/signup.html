{% extends "auth_base.html" %}

{% block title %}회원가입{% endblock %}

{% block content %}
<!-- 회원가입 화면 카드 영역 -->
<section class="auth-card">
  <h2>회원가입</h2>

  <!-- 사용자 이름 입력 -->
  <input id="username" placeholder="username">

  <!-- 비밀번호 입력 -->
  <input id="password" placeholder="password" type="password">

  <!-- 비밀번호 확인 입력 -->
  <input id="password2" placeholder="password 확인" type="password">

  <!-- 회원가입 버튼 -->
  <button id="signupBtn">가입</button>

  <!-- 이미 계정이 있는 경우 로그인 페이지 이동 -->
  <p style="margin-top:12px;">
    이미 계정이 있나요? <a href="/login/">로그인</a>
  </p>
</section>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => {

  // // ------------------------------------
  // // axios 인스턴스 생성
  // // baseURL: 모든 API 요청의 기본 주소
  // // withCredentials: 세션 쿠키를 요청에 포함
  // // ------------------------------------
  // const api = axios.create({
  //   baseURL: "/",
  //   withCredentials: true
  // });


  if (!window.api) {
    console.error("window.api가 없습니다. auth_base.html에서 static/js/api.js가 로드됐는지 확인하세요.");
    alert("설정 오류: api.js가 로드되지 않았습니다.");
    return; // ✅ [추가됨] api 없으면 중단
  }

  // // ------------------------------------
  // // axios 요청 인터셉터
  // // 요청을 보내기 전에 CSRF 토큰을 자동으로 헤더에 추가
  // // Django POST 요청에서 CSRF 검증을 통과하기 위해 필요
  // // ------------------------------------
  // api.interceptors.request.use(config => {

  //   // 브라우저 쿠키에서 csrftoken 값을 찾기
  //   const csrfToken = document.cookie
  //     .split("; ")
  //     .find(r => r.startsWith("csrftoken="))
  //     ?.split("=")[1];

  //   // headers 객체가 없으면 생성
  //   config.headers = config.headers || {};

  //   // CSRF 토큰이 있으면 헤더에 추가
  //   if (csrfToken) {
  //     config.headers["X-CSRFToken"] = csrfToken;
  //   }

  //   return config;
  // });


  // ------------------------------------
  // 회원가입 버튼 클릭 이벤트
  // ------------------------------------
  document.getElementById("signupBtn").addEventListener("click", async () => {

    try {

      // 입력 필드에서 값 가져오기
      const username  = document.getElementById("username").value.trim();
      const password  = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;

       // [추가됨] 빈 값 체크
      if (!username || !password || !password2) {
        alert("모든 값을 입력해주세요.");
        return;
      }

      // [추가됨] 비밀번호 일치 체크
      if (password !== password2) {
        alert("비밀번호가 일치하지 않습니다.");
        return;
      }

      // 회원가입 API 호출
      // POST /api/signup/
      // await api.post("/api/signup/", {
      //   username,
      //   password,
      //   password2
      // });
      await window.api.post("api/signup/", { username, password, password2 });


      // 회원가입 성공 메시지
      alert("회원가입 완료 → 로그인으로 이동");

      // 로그인 페이지로 이동
      window.location.href = "/login/";

    } catch (err) {

      // 오류 정보 콘솔 출력
      console.log(err.response?.data || err.message);

     const msg =
        err.response?.data?.detail ||
        err.response?.data?.username?.[0] ||
        err.response?.data?.password?.[0] ||
        "회원가입 실패";
      alert(msg);

    }
  });
});
</script>
{% endblock %}
